<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
      <style>
        body {
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }

        /* Light Theme */
        .light {
            background: white;
            color: black;
        }

        /* Dark Theme */
        .dark {
            background: #222;
            color: white;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    
    <h2>Dark / Light Mode Example</h2>

    <button onclick="setTheme('light')">Light</button>
    <button onclick="setTheme('dark')">Dark</button>

    <script src="./script.js"></script>
</body>
</html>
